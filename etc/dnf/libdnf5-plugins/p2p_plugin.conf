# P2P Sharing Plugin Configuration
#
# This file configures the libdnf5 P2P package sharing plugin.
# Uncomment and modify options as needed.
#

[main]
# Enable or disable the plugin
enabled = 1

[p2p]
# Enable P2P package sharing
enabled = true

# Local proxy server port
proxy_port = 8888

# Local proxy server host
proxy_host = 127.0.0.1

# Enable local package caching for peer sharing
cache_enabled = true

# Timeout for peer discovery queries (seconds)
peer_discovery_timeout = 2

# Maximum number of parallel peer connections
max_parallel_peers = 5

# Maximum package cache size in MB (0 or less to disable size limits)
max_cache_size_mb = 1024

# Maximum disk usage percentage for the cache file system (0 or less to disable disk space checks)
max_disk_usage_percent = 90.0

# Enable debug logging
# debug = false

# Force upgrading of upstream HTTP mirror URLs to HTTPS (default: true)
force_https = true

# libp2p listener port (default: 8000)
# libp2p_port = 8000

# Package cache directory (default: /var/cache/dnf-plugin-p2p when run as root, otherwise ~/.cache/dnf-plugin-p2p)
# cache_dir = /var/cache/dnf-plugin-p2p

